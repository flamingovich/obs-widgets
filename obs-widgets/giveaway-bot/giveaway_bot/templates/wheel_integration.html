<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интеграция колеса</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Google Sans', 'Roboto', sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            height: 56px;
            background: #252525;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        .header a {
            color: #999;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #333;
        }
        .header a:hover { color: #fff; border-color: #555; }
        .content {
            padding: 16px;
            display: grid;
            gap: 12px;
            grid-template-rows: auto 1fr;
            flex: 1;
            min-height: 0;
        }
        .hint {
            background: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 13px;
            color: #bdbdbd;
        }
        .frame-wrap {
            border: 1px solid #333;
            border-radius: 10px;
            overflow: hidden;
            min-height: 0;
            background: #111;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            min-height: 720px;
            background: #111;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>Интеграция колеса в Giveaway Bot</div>
        <div style="display:flex; gap:8px;">
            <a href="/">Панель</a>
            <a href="/obs-dock">OBS Dock</a>
            <a href="http://127.0.0.1:58971/panel.html" target="_blank" rel="noopener">Колесо (отдельно)</a>
        </div>
    </div>

    <div class="content">
        <div class="hint">
            Встроена панель колеса из отдельного модуля (`http://127.0.0.1:58971/panel.html`).
            Логика розыгрыша `giveaway_bot` не затронута.
        </div>
        <div class="frame-wrap">
            <iframe src="http://127.0.0.1:58971/panel.html" title="Wheel Panel"></iframe>
        </div>
    </div>
</body>
</html>
